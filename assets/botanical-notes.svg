<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
    <radialGradient id="amber-drop" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="40%" stop-color="#e5c158" />
      <stop offset="80%" stop-color="#c87a28" />
      <stop offset="100%" stop-color="#321a24" />
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="#0e0d11" />
  
  <!-- Botanical Line Art (Smoked Iris / Jasmine Petals) -->
  <g transform="translate(180, 300)" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.85">
    <path d="M 0 0 C -60 -120 40 -200 80 -140 C 120 -200 220 -120 160 0 C 220 120 120 200 80 140 C 40 200 -60 120 0 0 Z" />
    <circle cx="80" cy="0" r="22" fill="rgba(212, 175, 55, 0.2)" />
    <path d="M 80 0 L 80 200" stroke-width="2" />
    <path d="M 80 80 Q 20 120 -20 80" />
    <path d="M 80 130 Q 140 160 180 120" />
  </g>
  
  <!-- Glowing Amber Drops & Rare Cedarwood -->
  <circle cx="520" cy="220" r="55" fill="url(#amber-drop)" />
  <circle cx="480" cy="380" r="75" fill="url(#amber-drop)" opacity="0.9" />
  <circle cx="640" cy="320" r="40" fill="url(#amber-drop)" opacity="0.75" />
  
  <!-- Golden Dust Particles -->
  <circle cx="360" cy="180" r="5" fill="#f3e5ab" opacity="0.8" />
  <circle cx="430" cy="290" r="4" fill="#f3e5ab" opacity="0.6" />
  <circle cx="590" cy="160" r="6" fill="#f3e5ab" opacity="0.9" />
  <circle cx="310" cy="410" r="4" fill="#f3e5ab" opacity="0.7" />
  
  <!-- Overlay Frame -->
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3" />
</svg>
