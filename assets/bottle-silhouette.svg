<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="40%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)" />
      <stop offset="50%" stop-color="rgba(30,28,36,0.85)" />
      <stop offset="100%" stop-color="rgba(10,10,14,0.95)" />
    </linearGradient>
    <linearGradient id="liquid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5c158" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#c87a28" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#321a24" stop-opacity="0.95" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(212, 175, 55, 0.4)" />
      <stop offset="100%" stop-color="rgba(212, 175, 55, 0)" />
    </radialGradient>
  </defs>
  
  <!-- Background Glow -->
  <rect x="0" y="0" width="600" height="800" fill="#08080a" />
  <circle cx="300" cy="450" r="240" fill="url(#glow)" />
  
  <!-- Pedestal / Velvet Shadow -->
  <ellipse cx="300" cy="720" rx="200" ry="24" fill="rgba(0,0,0,0.85)" />
  <ellipse cx="300" cy="720" rx="140" ry="12" fill="url(#gold-grad)" opacity="0.3" />

  <!-- Perfume Bottle Base (Crystal Glass) -->
  <rect x="160" y="280" width="280" height="420" rx="16" fill="url(#glass-grad)" stroke="url(#gold-grad)" stroke-width="2" />
  
  <!-- Inner Liquid Chamber -->
  <path d="M 190 340 Q 300 350 410 340 L 410 670 Q 300 680 190 670 Z" fill="url(#liquid-grad)" />
  
  <!-- Internal Gold Leaf & Bubble Particles -->
  <circle cx="260" cy="450" r="4" fill="#f3e5ab" opacity="0.7" />
  <circle cx="340" cy="520" r="6" fill="#f3e5ab" opacity="0.6" />
  <circle cx="290" cy="590" r="5" fill="#f3e5ab" opacity="0.8" />
  <circle cx="220" cy="620" r="3" fill="#f3e5ab" opacity="0.5" />
  <circle cx="370" cy="410" r="3" fill="#f3e5ab" opacity="0.6" />
  
  <!-- Glass Reflection Highlights -->
  <rect x="180" y="300" width="16" height="380" rx="8" fill="rgba(255,255,255,0.22)" />
  <rect x="404" y="300" width="8" height="380" rx="4" fill="rgba(255,255,255,0.12)" />
  
  <!-- Gold Collar & Sprayer -->
  <rect x="260" y="240" width="80" height="40" rx="4" fill="url(#gold-grad)" />
  <rect x="280" y="210" width="40" height="30" fill="#222" stroke="url(#gold-grad)" stroke-width="1.5" />
  
  <!-- Heavy Gold & Obsidian Cap -->
  <rect x="230" y="80" width="140" height="130" rx="8" fill="#111116" stroke="url(#gold-grad)" stroke-width="3" />
  <line x1="230" y1="145" x2="370" y2="145" stroke="url(#gold-grad)" stroke-width="2" />
  <circle cx="300" cy="112" r="12" fill="url(#gold-grad)" />
  
  <!-- Luxury Label Plate -->
  <rect x="210" y="440" width="180" height="140" fill="#0c0b0e" stroke="url(#gold-grad)" stroke-width="1.5" rx="4" />
  <text x="300" y="485" font-family="'Cinzel', serif" font-size="16" fill="#d4af37" text-anchor="middle" letter-spacing="4">PERFUME</text>
  <line x1="250" y1="500" x2="350" y2="500" stroke="#d4af37" stroke-width="0.75" />
  <text x="300" y="525" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="20" fill="#f9f8f5" text-anchor="middle">L'Ombre d'Or</text>
  <text x="300" y="555" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" fill="#9e9a9f" text-anchor="middle" letter-spacing="3">EXTRAIT DE PARFUM</text>
</svg>
