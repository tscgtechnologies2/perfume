<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
    <linearGradient id="vial-glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)" />
      <stop offset="40%" stop-color="rgba(255,255,255,0.05)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.2)" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#0d0c10" />
  
  <!-- Velvet Box Pedestal -->
  <rect x="80" y="100" width="640" height="320" rx="12" fill="#15131a" stroke="url(#gold)" stroke-width="2" />
  <rect x="100" y="120" width="600" height="280" rx="8" fill="#09080b" />
  
  <!-- 5 Miniature Discovery Vials -->
  <!-- Vial 1 -->
  <g transform="translate(150, 160)">
    <rect x="0" y="0" width="56" height="200" rx="28" fill="url(#vial-glass)" stroke="url(#gold)" stroke-width="1.2" />
    <rect x="8" y="60" width="40" height="130" rx="20" fill="#d4af37" opacity="0.7" />
    <rect x="14" y="-18" width="28" height="24" rx="4" fill="url(#gold)" />
    <text x="28" y="130" font-family="'Cinzel', serif" font-size="16" fill="#08080a" font-weight="700" text-anchor="middle">I</text>
  </g>
  <!-- Vial 2 -->
  <g transform="translate(255, 160)">
    <rect x="0" y="0" width="56" height="200" rx="28" fill="url(#vial-glass)" stroke="url(#gold)" stroke-width="1.2" />
    <rect x="8" y="60" width="40" height="130" rx="20" fill="#c87a28" opacity="0.8" />
    <rect x="14" y="-18" width="28" height="24" rx="4" fill="url(#gold)" />
    <text x="28" y="130" font-family="'Cinzel', serif" font-size="16" fill="#08080a" font-weight="700" text-anchor="middle">II</text>
  </g>
  <!-- Vial 3 -->
  <g transform="translate(360, 160)">
    <rect x="0" y="0" width="56" height="200" rx="28" fill="url(#vial-glass)" stroke="url(#gold)" stroke-width="1.2" />
    <rect x="8" y="60" width="40" height="130" rx="20" fill="#e5c158" opacity="0.85" />
    <rect x="14" y="-18" width="28" height="24" rx="4" fill="url(#gold)" />
    <text x="28" y="130" font-family="'Cinzel', serif" font-size="16" fill="#08080a" font-weight="700" text-anchor="middle">III</text>
  </g>
  <!-- Vial 4 -->
  <g transform="translate(465, 160)">
    <rect x="0" y="0" width="56" height="200" rx="28" fill="url(#vial-glass)" stroke="url(#gold)" stroke-width="1.2" />
    <rect x="8" y="60" width="40" height="130" rx="20" fill="#5e3046" opacity="0.8" />
    <rect x="14" y="-18" width="28" height="24" rx="4" fill="url(#gold)" />
    <text x="28" y="130" font-family="'Cinzel', serif" font-size="16" fill="#f9f8f5" font-weight="700" text-anchor="middle">IV</text>
  </g>
  <!-- Vial 5 -->
  <g transform="translate(570, 160)">
    <rect x="0" y="0" width="56" height="200" rx="28" fill="url(#vial-glass)" stroke="url(#gold)" stroke-width="1.2" />
    <rect x="8" y="60" width="40" height="130" rx="20" fill="#a8821a" opacity="0.8" />
    <rect x="14" y="-18" width="28" height="24" rx="4" fill="url(#gold)" />
    <text x="28" y="130" font-family="'Cinzel', serif" font-size="16" fill="#08080a" font-weight="700" text-anchor="middle">V</text>
  </g>
  
  <text x="400" y="440" font-family="'Cinzel', serif" font-size="18" fill="url(#gold)" text-anchor="middle" letter-spacing="6">THE DISCOVERY ATELIER</text>
</svg>
