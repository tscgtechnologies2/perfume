      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
    <radialGradient id="bg-glow" cx="70%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(212, 175, 55, 0.22)" />
      <stop offset="60%" stop-color="rgba(20, 18, 25, 0.95)" />
      <stop offset="100%" stop-color="#08080a" />
    </radialGradient>
