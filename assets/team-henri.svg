  <path d="M 80 480 L 80 380 C 80 340 110 320 140 315 L 160 310 L 165 260 C 145 240 135 210 135 170 C 135 110 165 75 210 75 C 255 75 285 110 285 170 C 285 210 275 240 255 260 L 260 310 L 280 315 C 310 320 340 340 340 380 L 340 480 Z" fill="#121116" stroke="url(#gold-rim)" stroke-width="1.8" />
  
  <!-- Suit Lapel Highlights -->
  <path d="M 140 315 L 180 400 L 180 480" fill="none" stroke="url(#gold-rim)" stroke-width="1.2" opacity="0.6" />
  <path d="M 280 315 L 240 400 L 240 480" fill="none" stroke="url(#gold-rim)" stroke-width="1.2" opacity="0.6" />
  
