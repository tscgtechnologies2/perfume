<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
    <radialGradient id="coffret-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="rgba(212, 175, 55, 0.22)" />
      <stop offset="65%" stop-color="#111116" />
      <stop offset="100%" stop-color="#08080a" />
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#coffret-bg)" />
  
  <!-- Open Wooden/Velvet Coffret Box -->
  <rect x="60" y="140" width="480" height="360" rx="12" fill="#151419" stroke="url(#gold)" stroke-width="3" />
  <rect x="80" y="160" width="440" height="320" rx="8" fill="#09080b" />
  
  <!-- 100ml Flacon in Center -->
  <g transform="translate(240, 190)">
    <rect x="0" y="60" width="120" height="180" rx="6" fill="rgba(255,255,255,0.12)" stroke="url(#gold)" stroke-width="2" />
    <rect x="30" y="30" width="60" height="30" fill="url(#gold)" rx="2" />
    <rect x="25" y="0" width="70" height="30" fill="#111116" stroke="url(#gold)" stroke-width="2" rx="4" />
    <text x="60" y="150" font-family="'Cinzel', serif" font-size="12" fill="url(#gold)" text-anchor="middle" letter-spacing="2">100 ML</text>
  </g>
  
  <!-- Two 30ml Layering Elixirs (Left & Right) -->
  <g transform="translate(130, 230)">
    <rect x="0" y="40" width="70" height="140" rx="35" fill="rgba(200, 122, 40, 0.4)" stroke="url(#gold)" stroke-width="1.5" />
    <rect x="20" y="15" width="30" height="25" fill="url(#gold)" />
    <text x="35" y="115" font-family="'Cinzel', serif" font-size="10" fill="#f9f8f5" text-anchor="middle">AMBER</text>
  </g>
  
  <g transform="translate(400, 230)">
    <rect x="0" y="40" width="70" height="140" rx="35" fill="rgba(94, 48, 70, 0.5)" stroke="url(#gold)" stroke-width="1.5" />
    <rect x="20" y="15" width="30" height="25" fill="url(#gold)" />
    <text x="35" y="115" font-family="'Cinzel', serif" font-size="10" fill="#f9f8f5" text-anchor="middle">IRIS</text>
  </g>
  
  <text x="300" y="525" font-family="'Cinzel', serif" font-size="16" fill="url(#gold)" text-anchor="middle" letter-spacing="6">LE COFFRET IMPÉRIAL</text>
</svg>
