<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="#08080a" />
  
  <!-- Outer Ornate Ring -->
  <circle cx="250" cy="250" r="210" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="8 6" />
  <circle cx="250" cy="250" r="190" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  
  <!-- Inner Geometric Diamond -->
  <polygon points="250,80 420,250 250,420 80,250" fill="rgba(212, 175, 55, 0.05)" stroke="url(#gold)" stroke-width="2" />
  <polygon points="250,110 390,250 250,390 110,250" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.6" />
  
  <!-- Monogram P / F -->
  <text x="250" y="275" font-family="'Cinzel', serif" font-size="110" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="2">P·F</text>
  
  <!-- Banner Ribbons -->
  <path d="M 140 340 Q 250 370 360 340" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  <text x="250" y="365" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#ebe8e0" text-anchor="middle" letter-spacing="6">ATELIER FOUNDED MMXVIII</text>
  <text x="250" y="160" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="24" fill="#d4af37" text-anchor="middle">Haute Parfumerie</text>
</svg>
