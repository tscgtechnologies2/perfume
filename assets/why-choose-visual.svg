<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5ab" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#a8821a" />
    </linearGradient>
    <radialGradient id="smoke" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(212, 175, 55, 0.25)" />
      <stop offset="50%" stop-color="rgba(42, 22, 32, 0.6)" />
      <stop offset="100%" stop-color="#08080a" />
    </radialGradient>
  </defs>
  <rect width="800" height="640" fill="url(#smoke)" />
  
  <!-- Swirling Golden Mist and Crystal Shards -->
  <g opacity="0.45" stroke="url(#gold)" stroke-width="1.5" fill="none">
    <polygon points="120,100 210,180 150,260" fill="rgba(212, 175, 55, 0.08)" />
    <polygon points="620,380 720,460 640,540" fill="rgba(212, 175, 55, 0.08)" />
    <path d="M 0 320 Q 200 240 400 320 T 800 320" stroke-width="2" opacity="0.3" />
    <path d="M 0 400 Q 300 480 600 360" stroke-width="1" opacity="0.2" />
  </g>

  <!-- High Fashion Mysterious Figure Silhouette in Silk/Velvet Blazer -->
  <g transform="translate(250, 140)">
    <!-- Backlight Glow Circle -->
    <circle cx="150" cy="180" r="160" fill="rgba(212, 175, 55, 0.12)" />
    
    <!-- Head & Sharp Tailored Shoulder Silhouette -->
    <path d="M 150 20 C 185 20 210 50 210 100 C 210 145 185 175 150 175 C 115 175 90 145 90 100 C 90 50 115 20 150 20 Z" fill="#0d0c11" stroke="url(#gold)" stroke-width="2" />
    <path d="M 20 500 L 20 360 C 20 300 70 260 120 250 L 150 245 L 180 250 C 230 260 280 300 280 360 L 280 500 Z" fill="#0d0c11" stroke="url(#gold)" stroke-width="2.5" />
    
    <!-- Lapel & Crystal Flacon held in hand -->
    <path d="M 120 250 L 150 380 L 180 250" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7" />
    <rect x="130" y="380" width="40" height="60" rx="4" fill="rgba(212, 175, 55, 0.3)" stroke="url(#gold)" stroke-width="2" />
    <rect x="142" y="365" width="16" height="15" fill="url(#gold)" />
  </g>

  <!-- Luxury Typography Watermark -->
  <text x="400" y="590" font-family="'Cinzel', serif" font-size="20" fill="url(#gold)" text-anchor="middle" letter-spacing="8">UNCOMPROMISING ARTISTRY</text>
</svg>
